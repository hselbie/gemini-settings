# Auto-approve read-only tools
# These tools only read data and cannot modify the filesystem or system state.
# Safe to auto-approve in all modes.

[[rule]]
toolName = "read_file"
decision = "allow"
priority = 100

[[rule]]
toolName = "glob"
decision = "allow"
priority = 100

[[rule]]
toolName = "grep"
decision = "allow"
priority = 100

[[rule]]
toolName = "list_directory"
decision = "allow"
priority = 100

[[rule]]
toolName = "read_many_files"
decision = "allow"
priority = 100

[[rule]]
toolName = "web_search"
decision = "allow"
priority = 100

[[rule]]
toolName = "web_fetch"
decision = "allow"
priority = 100

