# Auto-approve common build and test commands
# These are safe to run without confirmation.

[[rule]]
toolName = "run_shell_command"
commandPrefix = "npm test"
decision = "allow"
priority = 85

[[rule]]
toolName = "run_shell_command"
commandPrefix = "npm run"
decision = "allow"
priority = 85

[[rule]]
toolName = "run_shell_command"
commandPrefix = "npm install"
decision = "ask_user"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "npx "
decision = "ask_user"
priority = 100

