description = "Self-review the recent changes, checking for bugs, edge cases, and style issues."
prompt = """
Please review the changes in the current working tree (or the last commit if the tree is clean).

For each file changed:
1. Read the full file for context
2. Check the diff carefully
3. Look for: bugs, edge cases, missing error handling, style inconsistencies, unnecessary complexity

Be critical. If everything looks good, say so briefly. If there are issues, explain each one with:
- The specific file and line
- A clear rationale for WHY it's a problem (not just "this looks wrong")
- Concrete evidence: a failing test, a contradictory doc reference, or a demonstrated edge case
If you can't produce evidence for a concern, frame it as a question to investigate, not a finding.

After reviewing individual files, step back and consider:
- Do all the changes work together coherently?
- Are there any cross-file issues (e.g., interface mismatches, missing imports)?
- Is anything missing that should have been included?

**Test-backed review:** If you find something suspicious but aren't sure if it's actually a bug, don't just flag it as "potential issue" — write a small test that would expose the problem and run it. Report what actually happened. If the test passes, the code is fine and explain why. If it fails, you've confirmed a real bug. Uncertainty should be resolved with evidence, not speculation.

Run the project's existing test suite too. Report any failures the changes introduced.
"""
